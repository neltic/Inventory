<section class="search-bar">
    <mat-form-field class="search-box">
        <mat-label translate="Brand.FILTER_BY_NAME"></mat-label>
        <input matInput [ngModel]="filterText()" (ngModelChange)="filterText.set($event)">        
        @if (filterText()) {
            <button matSuffix mat-icon-button aria-label="Clear" (click)="filterText.set('')">
                <mat-icon>close</mat-icon>
            </button>
        }
    </mat-form-field>
</section>

<table 
    mat-table 
    [dataSource]="filteredBrands()"
    [trackBy]="trackById"
    class="data-table">

    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="data-table-id"><mat-icon>fingerprint</mat-icon></th>
        <td mat-cell *matCellDef="let b" class="data-table-id">{{b.brandId}}</td>
    </ng-container>

    <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef class="data-table-brand"><mat-icon>style</mat-icon></th>
        <td mat-cell *matCellDef="let b" class="data-table-brand">
            <span class="brand-badge-inline" [style.color]="b.color" [style.background-color]="b.background">
                {{b.name}}
            </span>
        </td>
    </ng-container>

    <ng-container matColumnDef="brand-alt">
        <th mat-header-cell *matHeaderCellDef class="data-table-brand"><mat-icon>border_style</mat-icon></th>
        <td mat-cell *matCellDef="let b" class="data-table-brand">
            <span class="brand-badge-outline" [class.is-dark]="isDarkColor(b.background)" [style.color]="b.background" [style.borderColor]="b.background">
                {{b.name}}
            </span>
        </td>
    </ng-container>

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef translate="Brand.NAME"></th>
        <td mat-cell *matCellDef="let b">{{b.name}}</td>
    </ng-container>

    <ng-container matColumnDef="scopes">
        <th mat-header-cell *matHeaderCellDef translate="Brand.SCOPE"></th>
        <td mat-cell *matCellDef="let b">
            <mat-chip-set class="inline-chips">
                @for (scope of entityScope.toCompactScopeArray(b.includedIn); track scope.value) {            
                    <mat-chip>
                        <mat-icon matChipAvatar>{{scope.icon}}</mat-icon>
                        <span [translate]="scope.label"></span>
                    </mat-chip>            
                }
            </mat-chip-set>
        </td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="data-table-actions">            
            <button mat-icon-button (click)="openAddDialog()"><mat-icon>post_add</mat-icon></button>
        </th>
        <td mat-cell *matCellDef="let b" class="data-table-actions">
            <button mat-icon-button (click)="openEditDialog(b)" class="btn-primary"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button (click)="deleteBrand(b)" class="btn-cancel"><mat-icon>delete</mat-icon></button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['id', 'brand', 'brand-alt', 'name', 'scopes', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['id', 'brand', 'brand-alt', 'name', 'scopes', 'actions'];"></tr>

</table>

@if (filteredBrands().length === 0) {
    <p translate="Brand.NO_BRANDS_FOUND"></p>
}

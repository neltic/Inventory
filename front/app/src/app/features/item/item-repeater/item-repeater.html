<mat-card class="list-card" appearance="outlined">
  <mat-card-header>    
    <mat-card-title>
      @if (category()) {
        <mat-icon [style.color]="category()?.color">
          {{ category()?.icon }}
        </mat-icon>
      } @else {
        <mat-icon color="disabled">help_outline</mat-icon>
      }      
      <span class="list-card-title">{{ item().name }}</span>  
    </mat-card-title>
  </mat-card-header>
  
  <img mat-card-image 
       [src]="item().itemId | asPhoto:'item':item().updatedAt:'thumbnails'"
       alt="Exterior photo of {{ item().name }}"
       appImgFallback
       crossorigin>
    
  <mat-card-actions>
    <button matButton (click)="goToEdit()"><mat-icon>edit_square</mat-icon><span>Edit</span></button>
    <button matButton (click)="goToDetails()"><mat-icon>zoom_in</mat-icon><span>Details</span></button>
    @if( item().hasStock ) {
      <button matButton (click)="viewStorage()"><mat-icon>inventory</mat-icon><span>Stock</span></button>
    }    
  </mat-card-actions>

</mat-card>

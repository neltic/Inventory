<div class="welcome-layout">
  <header class="welcome-layout-header">
    <h1 translate="Welcome.TITLE"></h1>
    <p translate="Welcome.SUBTITLE"></p>
  </header>

  <div class="welcome-layout-grid">    
    
    <mat-card class="welcome-layout-card primary" *hasRole="Role.Operator" [routerLink]="['/storage']" matRipple>
      <mat-card-header>
        <mat-icon mat-card-avatar>storage</mat-icon>
        <mat-card-title translate="Welcome.STORAGE_CARD_TITLE"></mat-card-title>    
        <mat-card-subtitle translate="Welcome.STORAGE_CARD_SUBTITLE"></mat-card-subtitle>   
      </mat-card-header>
      <mat-card-content *hasRole="Role.Operator">
        <p translate="Welcome.STORAGE_CARD_CONTENT"></p>
      </mat-card-content>
    </mat-card>

    <mat-card class="welcome-layout-card" [class.primary]="!securityService.hasRole(Role.Operator)" [routerLink]="['/box/list', null]" matRipple>
      <mat-card-header>
        <mat-icon mat-card-avatar>inventory</mat-icon>
        <mat-card-title translate="Welcome.BOX_CARD_TITLE"></mat-card-title>
        <mat-card-subtitle translate="Welcome.BOX_CARD_SUBTITLE"></mat-card-subtitle>
      </mat-card-header>
      <mat-card-content *hasRole="Role.Operator">
        <p translate="Welcome.BOX_CARD_CONTENT"></p>
      </mat-card-content>
      <mat-card-actions *hasRole="Role.Operator">
        <button mat-button [routerLink]="['/box/new', null]">
          <mat-icon>add</mat-icon>
          <span translate="Menu.NEW"></span>
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="welcome-layout-card" [routerLink]="['/item/list']" matRipple>
      <mat-card-header>
        <mat-icon mat-card-avatar>art_track</mat-icon>
        <mat-card-title translate="Welcome.ITEM_CARD_TITLE"></mat-card-title>
        <mat-card-subtitle translate="Welcome.ITEM_CARD_SUBTITLE"></mat-card-subtitle>
      </mat-card-header>
      <mat-card-content *hasRole="Role.Operator">
        <p translate="Welcome.ITEM_CARD_CONTENT"></p>
      </mat-card-content>
      <mat-card-actions *hasRole="Role.Operator">
        <button mat-button [routerLink]="['/item/new']">
          <mat-icon>add</mat-icon>
          <span translate="Menu.NEW"></span>
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="welcome-layout-card setup" [routerLink]="['/category/list']" matRipple>
      <mat-card-header>
        <mat-icon mat-card-avatar>category</mat-icon>
        <mat-card-title translate="Welcome.CATEGORY_CARD_TITLE"></mat-card-title>
        <mat-card-subtitle translate="Welcome.CATEGORY_CARD_SUBTITLE"></mat-card-subtitle>
      </mat-card-header>
      <mat-card-content *hasRole="Role.Operator">
        <p translate="Welcome.CATEGORY_CARD_CONTENT"></p>
      </mat-card-content>
    </mat-card>

    <mat-card class="welcome-layout-card setup" [routerLink]="['/brand/list']" matRipple>
      <mat-card-header>
        <mat-icon mat-card-avatar>verified</mat-icon>
        <mat-card-title translate="Welcome.BRAND_CARD_TITLE"></mat-card-title>
        <mat-card-subtitle translate="Welcome.BRAND_CARD_SUBTITLE"></mat-card-subtitle>
      </mat-card-header>
      <mat-card-content *hasRole="Role.Operator">
        <p translate="Welcome.BRAND_CARD_CONTENT"></p>
      </mat-card-content>
    </mat-card>

  </div>
</div>

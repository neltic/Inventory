services:

  stock-cache:
    image: redis:latest
    container_name: stock-cache
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
      
  stock-cache-insight:
    image: redis/redisinsight:latest
    container_name: stock-cache-insight
    ports:
      - "5540:5540"
    restart: always
    environment:
      - RI_APP_PORT=5540
      - RI_APP_HOST=0.0.0.0
      - RI_REDIS_HOST=stock-cache
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=stock-local-cache
    volumes:
      - stock_cache_insight_data:/data
    depends_on:
      stock-cache:
        condition: service_healthy
    networks:
      - app-network
      
  stock-cdn:
    image: nginx:alpine
    container_name: stock-cdn
    ports:
      - "80:80" 
    volumes:      
      - "${STATIC_STORAGE_PATH}:/usr/share/nginx/html:ro"
      - "./infra/cdn/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - app-network
      
  stock-cleaner:
    image: python:3.11-alpine
    container_name: stock-cleaner
    volumes:      
      - "${STATIC_STORAGE_PATH}/temp:/temp_files:rw"
      - "./infra/cleaner/task.py:/task.py:ro"
    command: python -u /task.py
    restart: always
    networks:
      - app-network

  stock-back:
    container_name: stock-back
    build:
      context: ./back
      dockerfile: Stock.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - RedisConfig__ConnectionHost=stock-cache:6379
      - FileStorage__TempPath=/app/storage/temp/
      - FileStorage__BoxPath=/app/storage/img/box/
      - FileStorage__ItemPath=/app/storage/img/item/
      - ASPNETCORE_HTTP_MAXREQUESTBODYSIZE=20971520
    volumes:
      - "${STATIC_STORAGE_PATH}/temp:/app/storage/temp"
      - "${STATIC_STORAGE_PATH}/img/box:/app/storage/img/box"
      - "${STATIC_STORAGE_PATH}/img/item:/app/storage/img/item"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      stock-cache:
        condition: service_healthy
      stock-cdn:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network
      
  stock-front:
    container_name: stock-front
    build:
      context: ./front/app
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      stock-back:
        condition: service_healthy
      stock-cdn:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network  

  stock-worker:
    container_name: stock-worker
    build:
      context: ./back
      dockerfile: Stock.Worker/Dockerfile
    restart: always
    environment:
      - DOTNET_ENVIRONMENT=Development
      - STATIC_STORAGE_PATH=/app/storage
      - DB_BACKUP_CONNECTION=${DB_CONNECTION}
      - DB_BACKUP_PATH=${DB_BACKUP_PATH}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - WORKER_USER_ID=${WORKER_USER_ID}
      - WORKER_APP_NAME=${WORKER_APP_NAME}
    volumes:      
      - "${STATIC_STORAGE_PATH}:/app/storage:rw"
    depends_on:
      stock-back:
        condition: service_healthy
    networks:
      - app-network

volumes:
    stock_cache_insight_data:

networks:
  app-network:
    driver: bridge
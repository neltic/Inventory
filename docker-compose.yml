services:

  stock-db:
    image: storage/stock-db:1.0
    build:
      context: .
      dockerfile: ./infra/sql/Dockerfile
    container_name: stock-db
    environment:
      - ACCEPT_EULA=Y      
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
      - MSSQL_COLLATION=Latin1_General_100_CI_AS_SC_UTF8
    ports:
      - "1433:1433"
    volumes:
      - ./infra/sql/data:/var/opt/mssql/data
      - ./infra/sql/backups:/var/opt/mssql/backups
      - "${STATIC_STORAGE_PATH}/temp:/var/opt/mssql/temp"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  stock-cache:
    image: storage/stock-cache:1.0
    build:
      context: .
      dockerfile: ./infra/cache/Dockerfile
    container_name: stock-cache
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
      
  stock-cache-insight:
    image: storage/stock-cache-insight:1.0
    build:
      context: .
      dockerfile: ./infra/cache-insight/Dockerfile
    container_name: stock-cache-insight
    ports:
      - "5540:5540"
    restart: always
    environment:
      - RI_APP_PORT=5540
      - RI_APP_HOST=0.0.0.0
      - RI_REDIS_HOST=stock-cache
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=stock-local-cache
    volumes:
      - stock_cache_insight_data:/data
    depends_on:
      stock-cache:
        condition: service_healthy
    networks:
      - app-network
      
  stock-cdn:    
    image: storage/stock-cdn:1.0
    build:
      context: .
      dockerfile: ./infra/cdn/Dockerfile
    container_name: stock-cdn
    ports:
      - "80:80" 
    volumes:      
      - "${STATIC_STORAGE_PATH}:/usr/share/nginx/html:ro"
      - "./infra/cdn/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - app-network
      
  stock-cleaner:
    image: storage/stock-cleaner:1.0
    build:
      context: .
      dockerfile: ./infra/cleaner/Dockerfile
    container_name: stock-cleaner
    volumes:      
      - "${STATIC_STORAGE_PATH}/temp:/temp_files:rw"
    restart: always
    networks:
      - app-network
      
  stock-auth:
    image: storage/stock-auth:1.0
    build:
      context: .
      dockerfile: ./infra/auth/Dockerfile
    container_name: stock-auth
    environment:
      - KC_HEALTH_ENABLED=true    
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true      
      - KC_DB=mssql
      - KC_DB_URL=jdbc:sqlserver://stock-db:1433;databaseName=KeycloakDb;encrypt=false;trustServerCertificate=true
      - KC_DB_USERNAME=${DB_USERNAME}
      - KC_DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8080:8080"    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      stock-db:
        condition: service_healthy
    networks:
      - app-network

  stock-back:
    image: storage/stock-back:1.0
    build:
      context: ./back
      dockerfile: Stock.Api/Dockerfile
    container_name: stock-back
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - RedisConfig__ConnectionHost=stock-cache:6379
      - FileStorage__TempPath=/app/storage/temp/
      - FileStorage__BoxPath=/app/storage/img/box/
      - FileStorage__ItemPath=/app/storage/img/item/
      - Keycloak__Authority=http://stock-auth:8080/realms/StockRealm      
      - Keycloak__MetadataAddress=http://stock-auth:8080/realms/StockRealm/.well-known/openid-configuration      
      - Keycloak__Issuer=http://localhost:8080/realms/StockRealm
      - ASPNETCORE_HTTP_MAXREQUESTBODYSIZE=20971520
    volumes:
      - "${STATIC_STORAGE_PATH}/temp:/app/storage/temp"
      - "${STATIC_STORAGE_PATH}/img/box:/app/storage/img/box"
      - "${STATIC_STORAGE_PATH}/img/item:/app/storage/img/item"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      stock-db:
        condition: service_healthy 
      stock-auth:
        condition: service_healthy
      stock-cache:
        condition: service_healthy
      stock-cdn:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network
      
  stock-front:
    image: storage/stock-front:1.0
    build:
      context: ./front/app
      dockerfile: Dockerfile
    container_name: stock-front    
    ports:
      - "4200:80"
    depends_on:
      stock-db:
        condition: service_healthy
      stock-auth:
        condition: service_healthy
      stock-back:
        condition: service_healthy
      stock-cdn:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network  

  stock-worker:
    image: storage/stock-worker:1.0
    build:
      context: ./back
      dockerfile: Stock.Worker/Dockerfile
    container_name: stock-worker
    restart: always
    environment:
      - DOTNET_ENVIRONMENT=Development
      - STATIC_STORAGE_PATH=/app/storage
      - DB_BACKUP_CONNECTION=${DB_CONNECTION}
      - DB_BACKUP_PATH=${DB_BACKUP_PATH}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - WORKER_USER_ID=${WORKER_USER_ID}
      - WORKER_APP_NAME=${WORKER_APP_NAME}
      - WORKER_BACKUP_RUN_AT_STARTUP=${WORKER_BACKUP_RUN_AT_STARTUP}
      - WORKER_BACKUP_RUN_AFTER_MINUTES=${WORKER_BACKUP_RUN_AFTER_MINUTES}
    volumes:      
      - "${STATIC_STORAGE_PATH}:/app/storage:rw"
    depends_on:
      stock-db:
        condition: service_healthy 
      stock-auth:
        condition: service_healthy
      stock-back:
        condition: service_healthy      
    networks:
      - app-network

volumes:
    stock_cache_insight_data:

networks:
  app-network:
    driver: bridge